<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BetaLife — Shrine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #05050d;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: Georgia, serif;
}

/* ── SCENE ── */
.scene {
  position: relative;
  width: 860px;
  height: 560px;
}

/* ── STARS ── */
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--d) ease-in-out infinite var(--delay);
}
@keyframes twinkle {
  0%,100% { opacity:.15; }
  50%      { opacity: 1; }
}

/* ── GROUND FOG ── */
.ground {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 140px;
  background: linear-gradient(to top, #0b0b18 0%, #0b0b18 55%, transparent 100%);
  pointer-events: none;
}
.fog {
  position: absolute;
  bottom: 55px;
  width: 120%;
  left: -10%;
  height: 70px;
  background: radial-gradient(ellipse at 50% 100%, rgba(70,45,110,.35) 0%, transparent 70%);
  animation: fog-drift 9s ease-in-out infinite;
}
@keyframes fog-drift {
  0%,100% { transform: scaleX(1) translateX(0); }
  50%      { transform: scaleX(1.06) translateX(18px); }
}

/* ── LIGHT PILLARS ── */
.pillar {
  position: absolute;
  bottom: 60px;
  width: 1px;
  background: linear-gradient(to top, rgba(110,70,200,.28), transparent);
  animation: pillar-flicker var(--d) ease-in-out infinite var(--delay);
}
@keyframes pillar-flicker {
  0%,100% { opacity:.3; }
  50%      { opacity:.9; }
}

/* ════════════════════════════════
   SHRINE
════════════════════════════════ */
.shrine {
  position: absolute;
  bottom: 88px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Crystal on top */
.crystal-wrap {
  position: relative;
  margin-bottom: 4px;
}
.crystal {
  width: 22px;
  height: 40px;
  background: linear-gradient(160deg, #e0c8ff 0%, #9060e0 45%, #3a1870 100%);
  clip-path: polygon(50% 0%, 90% 55%, 75% 100%, 25% 100%, 10% 55%);
  animation: crystal-glow 3.5s ease-in-out infinite;
  filter: drop-shadow(0 0 6px #b080ff);
}
@keyframes crystal-glow {
  0%,100% { filter: drop-shadow(0 0 4px #9060d0) brightness(.85); }
  50%      { filter: drop-shadow(0 0 14px #d0a0ff) brightness(1.25); }
}
.crystal-beam {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 210px;
  background: linear-gradient(to top, rgba(160,100,255,.55) 0%, rgba(200,160,255,.2) 55%, transparent 100%);
  border-radius: 2px;
  animation: beam-flicker 4s ease-in-out infinite;
}
@keyframes beam-flicker {
  0%,100% { opacity:.45; width:3px; }
  50%      { opacity:.85; width:5px; }
}

/* Shrine cap */
.shrine-cap {
  width: 170px;
  height: 28px;
  background: linear-gradient(to bottom, #28203a, #1c1628);
  clip-path: polygon(3% 100%, 97% 100%, 92% 0%, 8% 0%);
  border-top: 1px solid #4a306a;
  position: relative;
}
/* Runes on cap */
.cap-rune {
  position: absolute;
  top: 6px;
  color: #8050c0;
  font-size: 12px;
  animation: rune-pulse var(--d) ease-in-out infinite var(--delay);
  text-shadow: 0 0 6px #a070e0;
}
@keyframes rune-pulse {
  0%,100% { opacity:.4; text-shadow:0 0 4px #7040b0; }
  50%      { opacity:1;  text-shadow:0 0 12px #c0a0ff, 0 0 22px #8050c0; }
}

/* Shrine body */
.shrine-body {
  width: 148px;
  height: 76px;
  background: linear-gradient(to bottom, #1c1628 0%, #120e1c 100%);
  border-left: 1px solid #3a2555;
  border-right: 1px solid #3a2555;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.shrine-body::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(120,70,200,.18) 0%, transparent 65%);
}
.shrine-center-rune {
  font-size: 28px;
  color: #9060d0;
  text-shadow: 0 0 10px #b080f0, 0 0 25px #8050b0;
  animation: rune-pulse 2.8s ease-in-out infinite;
  z-index: 1;
}

/* Shrine steps */
.shrine-step {
  background: linear-gradient(to bottom, #1a1528, #100d1c);
  border-left: 1px solid #2e1e46;
  border-right: 1px solid #2e1e46;
  border-bottom: 1px solid #2e1e46;
}

/* Shrine particles */
.shrine-particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #c0a0ff;
  border-radius: 50%;
  animation: shrine-float var(--d) var(--delay) ease-in linear infinite;
  opacity: 0;
}
@keyframes shrine-float {
  0%   { transform: translateY(0) translateX(0);   opacity: 0; }
  15%  { opacity: .8; }
  100% { transform: translateY(-160px) translateX(var(--drift)); opacity: 0; }
}

/* ════════════════════════════════
   NPC BASE
════════════════════════════════ */
.npc {
  position: absolute;
  bottom: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: npc-idle var(--speed) ease-in-out infinite;
}
@keyframes npc-idle {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

.npc-shadow {
  width: 48px;
  height: 7px;
  border-radius: 50%;
  background: rgba(0,0,0,.45);
  margin-top: -3px;
  animation: shadow-breathe var(--speed) ease-in-out infinite;
}
@keyframes shadow-breathe {
  0%,100% { transform: scaleX(1);    opacity:.6; }
  50%      { transform: scaleX(.82); opacity:.3; }
}

.npc-figure { position: relative; }

/* Head */
.npc-head {
  width: var(--hw, 24px);
  height: var(--hh, 26px);
  background: var(--skin, #c8a478);
  border-radius: 45% 45% 38% 38%;
  margin: 0 auto;
  position: relative;
  box-shadow: inset -3px -3px 6px rgba(0,0,0,.35);
}
.npc-eye {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #111;
  border-radius: 50%;
  top: 42%;
  animation: blink 5.5s ease-in-out infinite var(--blink, 0s);
}
.npc-eye.l { left: 22%; }
.npc-eye.r { right: 22%; }
@keyframes blink {
  0%,94%,100% { transform: scaleY(1); }
  96%          { transform: scaleY(.08); }
}

/* Helm for warrior */
.helm {
  position: absolute;
  top: -10px; left: -3px; right: -3px;
  height: 16px;
  background: linear-gradient(to bottom, #708090, #4a5560);
  border-radius: 50% 50% 0 0;
  box-shadow: inset 0 3px 5px rgba(255,255,255,.15);
}
.helm-visor {
  position: absolute;
  bottom: -3px; left: 10%; right: 10%;
  height: 6px;
  background: #3a4248;
  border-radius: 0 0 3px 3px;
}

/* Hood for mage */
.hood {
  position: absolute;
  top: -14px; left: -5px; right: -5px;
  height: 22px;
  background: var(--robe-color, #1a1540);
  border-radius: 50% 50% 0 0;
  box-shadow: -2px -2px 4px rgba(0,0,0,.5);
}

/* Scarf/cloth for rogue */
.bandana {
  position: absolute;
  top: 50%; left: -3px; right: -3px;
  height: 10px;
  background: #6a2030;
  border-radius: 2px;
}

/* Torso */
.npc-torso {
  width: var(--tw, 30px);
  height: var(--th, 36px);
  background: var(--armor, #2a3050);
  border-radius: 3px 3px 5px 5px;
  margin: -2px auto 0;
  position: relative;
  border: 1px solid rgba(255,255,255,.07);
  box-shadow: inset -3px -4px 8px rgba(0,0,0,.4);
}
/* Armor detail */
.torso-detail {
  position: absolute;
  top: 6px; left: 50%; transform: translateX(-50%);
  width: 10px; height: 18px;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 2px;
}

/* Arms */
.npc-arm {
  position: absolute;
  width: 9px;
  height: var(--th, 36px);
  background: var(--armor, #2a3050);
  border-radius: 3px;
  top: 0;
  box-shadow: inset -2px -2px 4px rgba(0,0,0,.35);
  transform-origin: top center;
}
.npc-arm.l {
  right: calc(100% - 2px);
  animation: arm-l var(--speed) ease-in-out infinite;
}
.npc-arm.r {
  left: calc(100% - 2px);
  animation: arm-r var(--speed) ease-in-out infinite;
}
@keyframes arm-l {
  0%,100% { transform: rotate(-6deg); }
  50%      { transform: rotate(6deg); }
}
@keyframes arm-r {
  0%,100% { transform: rotate(6deg); }
  50%      { transform: rotate(-6deg); }
}

/* Legs */
.npc-legs {
  display: flex;
  gap: 4px;
  margin: 1px auto 0;
  width: var(--tw, 30px);
  justify-content: center;
}
.npc-leg {
  width: 11px;
  height: var(--lh, 28px);
  background: var(--leg, #18182e);
  border-radius: 2px 2px 4px 4px;
  border: 1px solid rgba(255,255,255,.05);
}

/* Stars + name */
.npc-label {
  position: absolute;
  top: -26px;
  width: 80px;
  left: 50%; transform: translateX(-50%);
  text-align: center;
}
.npc-stars {
  color: #f0c040;
  font-size: 9px;
  text-shadow: 0 0 5px #f0c040;
  letter-spacing: 1px;
}
.npc-name {
  color: rgba(190,175,230,.6);
  font-size: 8px;
  letter-spacing: 1.5px;
  margin-top: 2px;
  text-transform: uppercase;
}

/* Weapon / staff glow */
.weapon {
  position: absolute;
  top: -8px;
  right: -14px;
  width: 5px;
  height: 60px;
  background: linear-gradient(to bottom, #c0c8d8, #6a7280);
  border-radius: 2px;
  box-shadow: 0 0 4px rgba(200,220,255,.4);
  animation: weapon-glint 7s ease-in-out infinite var(--delay, 0s);
}
.weapon::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 50%; transform: translateX(-50%);
  width: 14px; height: 14px;
  background: linear-gradient(135deg, #c0d8ff, #6090d0);
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
}
@keyframes weapon-glint {
  0%,88%,100% { filter: brightness(1); }
  93%          { filter: brightness(2.8) drop-shadow(0 0 4px #a0c0ff); }
}

.staff {
  position: absolute;
  top: -22px;
  left: -12px;
  width: 4px;
  height: 70px;
  background: linear-gradient(to bottom, #6a4a2a, #3a2818);
  border-radius: 2px;
}
.staff-orb {
  position: absolute;
  top: -14px;
  left: 50%; transform: translateX(-50%);
  width: 16px; height: 16px;
  background: radial-gradient(circle at 35% 35%, #d0a0ff, #6030a0);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(160,100,255,.8), 0 0 20px rgba(130,70,220,.4);
  animation: orb-pulse 2.5s ease-in-out infinite;
}
@keyframes orb-pulse {
  0%,100% { box-shadow: 0 0 6px rgba(160,100,255,.6); }
  50%      { box-shadow: 0 0 14px rgba(200,150,255,1), 0 0 28px rgba(160,100,255,.5); }
}

.dagger {
  position: absolute;
  top: -2px;
  left: -10px;
  width: 3px;
  height: 22px;
  background: linear-gradient(to bottom, #e0e8f0, #6a7888);
  border-radius: 1px 1px 0 0;
  transform: rotate(-20deg);
}

/* ════════════════════════════════
   HADA — LA ENTIDAD
════════════════════════════════ */
.hada {
  position: absolute;
  top: 38px;
  left: 50%; transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: hada-float 5.5s ease-in-out infinite;
}
@keyframes hada-float {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-14px); }
}

/* Outer aura */
.hada-aura-outer {
  position: absolute;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200,230,255,.12) 0%, rgba(140,190,255,.04) 55%, transparent 75%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: aura-breathe 5.5s ease-in-out infinite;
}
@keyframes aura-breathe {
  0%,100% { transform: translate(-50%,-50%) scale(1);    opacity:.7; }
  50%      { transform: translate(-50%,-50%) scale(1.18); opacity:1; }
}

/* Orbiting ring */
.hada-ring {
  position: absolute;
  width: 80px; height: 20px;
  border: 1px solid rgba(180,220,255,.25);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotateX(75deg);
  animation: ring-spin 9s linear infinite;
  box-shadow: 0 0 8px rgba(180,220,255,.15);
}
.hada-ring::before {
  content: '';
  position: absolute;
  width: 6px; height: 6px;
  background: rgba(200,235,255,.9);
  border-radius: 50%;
  top: 50%; left: 0;
  transform: translateY(-50%);
  box-shadow: 0 0 6px rgba(200,235,255,1);
}
@keyframes ring-spin {
  from { transform: translate(-50%,-50%) rotateX(75deg) rotate(0deg); }
  to   { transform: translate(-50%,-50%) rotateX(75deg) rotate(360deg); }
}

/* Wings — 4 panels */
.hada-wings {
  position: absolute;
  top: 12px;
  width: 200px;
  height: 90px;
  pointer-events: none;
}
.wing {
  position: absolute;
  border-radius: 50%;
  animation: wing-beat 3.5s ease-in-out infinite var(--wd, 0s);
}
/* Upper wings */
.w-ul {
  width: 60px; height: 48px;
  right: 50%; top: 0;
  transform-origin: right 80%;
  background: radial-gradient(ellipse at right center, rgba(200,230,255,.5) 0%, rgba(140,200,255,.2) 50%, transparent 80%);
  border-radius: 70% 10% 30% 50%;
}
.w-ur {
  width: 60px; height: 48px;
  left: 50%; top: 0;
  transform-origin: left 80%;
  background: radial-gradient(ellipse at left center, rgba(200,230,255,.5) 0%, rgba(140,200,255,.2) 50%, transparent 80%);
  border-radius: 10% 70% 50% 30%;
}
/* Lower wings */
.w-ll {
  width: 48px; height: 38px;
  right: 50%; top: 36px;
  transform-origin: right 20%;
  background: radial-gradient(ellipse at right top, rgba(170,210,255,.4) 0%, rgba(120,180,255,.15) 50%, transparent 80%);
  border-radius: 60% 20% 20% 50%;
}
.w-lr {
  width: 48px; height: 38px;
  left: 50%; top: 36px;
  transform-origin: left 20%;
  background: radial-gradient(ellipse at left top, rgba(170,210,255,.4) 0%, rgba(120,180,255,.15) 50%, transparent 80%);
  border-radius: 20% 60% 50% 20%;
}
@keyframes wing-beat {
  0%,100% { transform: scaleX(1) rotate(-4deg);  opacity:.7; }
  50%      { transform: scaleX(.75) rotate(6deg); opacity:1; }
}
.w-ur, .w-lr { animation-direction: reverse; }

/* Hada body */
.hada-body {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.hada-head {
  width: 30px; height: 32px;
  background: radial-gradient(circle at 38% 32%, rgba(255,255,255,.95) 0%, rgba(200,228,255,.92) 55%, rgba(150,200,255,.85) 100%);
  border-radius: 50%;
  position: relative;
  box-shadow: 0 0 16px rgba(200,225,255,.85), 0 0 35px rgba(140,200,255,.4);
}
.hada-eye {
  position: absolute;
  width: 5px; height: 5px;
  background: rgba(80,140,255,.92);
  border-radius: 50%;
  top: 44%;
  box-shadow: 0 0 7px rgba(160,210,255,1);
  animation: hada-eye-pulse 3.5s ease-in-out infinite;
}
.hada-eye.l { left: 24%; }
.hada-eye.r { right: 24%; }
@keyframes hada-eye-pulse {
  0%,100% { opacity:.7; }
  50%      { opacity:1; box-shadow:0 0 12px rgba(180,225,255,1); }
}

.hada-torso {
  width: 22px; height: 34px;
  background: linear-gradient(175deg, rgba(230,242,255,.95) 0%, rgba(160,205,255,.88) 55%, rgba(110,170,255,.8) 100%);
  border-radius: 4px 4px 7px 7px;
  margin: -3px auto 0;
  box-shadow: 0 0 16px rgba(170,215,255,.5);
}
.hada-skirt {
  width: 36px; height: 22px;
  background: linear-gradient(to bottom, rgba(155,200,255,.75) 0%, rgba(100,160,255,.35) 100%);
  clip-path: polygon(0% 0%, 100% 0%, 82% 100%, 18% 100%);
  margin: -2px auto 0;
}

/* Orbiting dots */
.hdot {
  position: absolute;
  width: 5px; height: 5px;
  background: rgba(210,235,255,.92);
  border-radius: 50%;
  box-shadow: 0 0 7px rgba(200,235,255,.9);
  top: 50%; left: 50%;
  animation: hdot-orbit var(--od) linear infinite var(--odelay);
}
@keyframes hdot-orbit {
  from { transform: rotate(var(--ostart)) translateX(var(--or)) rotate(calc(-1 * var(--ostart))); }
  to   { transform: rotate(calc(var(--ostart) + 360deg)) translateX(var(--or)) rotate(calc(-1 * (var(--ostart) + 360deg))); }
}

/* Hada label */
.hada-label {
  position: absolute;
  bottom: -28px; left: 50%;
  transform: translateX(-50%);
  color: rgba(200,230,255,.7);
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  white-space: nowrap;
  text-shadow: 0 0 10px rgba(180,220,255,.6);
}

/* ── AMBIENT RUNES ── */
.amb-rune {
  position: absolute;
  color: rgba(100,65,160,.38);
  font-size: 16px;
  animation: amb-float var(--d) var(--delay) ease-in-out infinite;
  user-select: none;
}
@keyframes amb-float {
  0%,100% { transform: translateY(0) rotate(0deg);   opacity:.25; }
  50%      { transform: translateY(-14px) rotate(8deg); opacity:.65; }
}

/* ── BOTTOM LABEL ── */
.scene-title {
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  color: rgba(160,140,210,.3);
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="scene" id="scene">

  <!-- ── STARS ── -->

  <!-- ── AMBIENT RUNES ── -->
  <span class="amb-rune" style="left:6%;top:20%;--d:6s;--delay:0s">ᚱ</span>
  <span class="amb-rune" style="left:12%;top:50%;--d:8s;--delay:1.5s">ᚦ</span>
  <span class="amb-rune" style="left:4%;top:70%;--d:7s;--delay:3s">ᚷ</span>
  <span class="amb-rune" style="right:7%;top:25%;--d:9s;--delay:.8s">ᚾ</span>
  <span class="amb-rune" style="right:13%;top:55%;--d:6.5s;--delay:2.2s">ᛁ</span>
  <span class="amb-rune" style="right:5%;top:72%;--d:7.5s;--delay:4s">ᛗ</span>
  <span class="amb-rune" style="left:28%;top:12%;--d:10s;--delay:1s">ᚩ</span>
  <span class="amb-rune" style="right:30%;top:10%;--d:8.5s;--delay:2.5s">ᛖ</span>

  <!-- ── LIGHT PILLARS ── -->
  <div class="pillar" style="left:18%;height:200px;--d:6s;--delay:0s"></div>
  <div class="pillar" style="left:35%;height:160px;--d:8s;--delay:2s"></div>
  <div class="pillar" style="right:18%;height:190px;--d:7s;--delay:1s"></div>
  <div class="pillar" style="right:35%;height:140px;--d:9s;--delay:3s"></div>

  <!-- ═══════════════════════════
       HADA — LA ENTIDAD
  ════════════════════════════ -->
  <div class="hada">
    <div class="hada-aura-outer"></div>
    <div class="hada-ring"></div>

    <!-- Wings -->
    <div class="hada-wings">
      <div class="wing w-ul" style="--wd:0s"></div>
      <div class="wing w-ur" style="--wd:0s"></div>
      <div class="wing w-ll" style="--wd:.18s"></div>
      <div class="wing w-lr" style="--wd:.18s"></div>
    </div>

    <!-- Body -->
    <div class="hada-body">
      <div class="hada-head">
        <div class="hada-eye l"></div>
        <div class="hada-eye r"></div>
      </div>
      <div class="hada-torso"></div>
      <div class="hada-skirt"></div>
    </div>

    <!-- Orbiting dots -->
    <div class="hdot" style="--od:4s;--odelay:0s;  --ostart:0deg;  --or:38px"></div>
    <div class="hdot" style="--od:4s;--odelay:0s;  --ostart:120deg;--or:38px"></div>
    <div class="hdot" style="--od:4s;--odelay:0s;  --ostart:240deg;--or:38px"></div>
    <div class="hdot" style="--od:6.5s;--odelay:0s;--ostart:60deg; --or:52px;opacity:.6"></div>
    <div class="hdot" style="--od:6.5s;--odelay:0s;--ostart:180deg;--or:52px;opacity:.6"></div>
    <div class="hdot" style="--od:6.5s;--odelay:0s;--ostart:300deg;--or:52px;opacity:.6"></div>

    <div class="hada-label">La Entidad</div>
  </div>

  <!-- ═══════════════════════════
       SHRINE
  ════════════════════════════ -->
  <div class="shrine">
    <!-- Beam from crystal upward -->

<script>
// Generate stars
const scene = document.getElementById('scene');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() < 0.15 ? 2 : 1;
  s.style.cssText = `
    width:${sz}px; height:${sz}px;
    top:${Math.random() * 75}%;
    left:${Math.random() * 100}%;
    --d:${2 + Math.random() * 5}s;
    --delay:${Math.random() * 6}s;
  `;
  scene.insertBefore(s, scene.firstChild);
}
</script>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 940" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#b080ff"/></marker>
    <marker id="arrG" markerWidth="12" markerHeight="12" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#f0c040"/></marker>
    <style>
      .box{fill:#120e22;stroke:#2e2348;stroke-width:1.5;rx:10;}
      .t{fill:#d8cdf0;}
      .num{fill:#b080ff;font-weight:bold;}
      .keep{fill:#7cc88c;}
      .warn{fill:#ff7090;}
      .gold{fill:#f0c040;}
      .dim{fill:#9a8fbe;}
      .vio{fill:#b080ff;}
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="940" fill="#05050d"/>

  <text x="700" y="46" text-anchor="middle" font-size="28" class="gold" letter-spacing="1">BetaLife → Pick Me Up! Infinite Gacha — Sistema RPG: qué remodelar</text>
  <text x="700" y="78" text-anchor="middle" font-size="16" class="dim">Izquierda = como está hoy   ·   Centro = el cambio   ·   Derecha = como debería ir (la novela)</text>

  <!-- ===== ACTUAL ===== -->
  <rect x="40" y="104" width="390" height="32" rx="8" fill="#2a1018" stroke="#c0506a"/>
  <text x="235" y="126" text-anchor="middle" font-size="17" class="warn" letter-spacing="2">ACTUAL — BetaLife hoy</text>

  <rect class="box" x="40" y="152" width="390" height="60" rx="10"/>
  <text x="60" y="188" font-size="16" class="t"><tspan class="num">1 · </tspan>Invocar en el Shrine (gacha)<tspan class="keep"> ✓</tspan></text>

  <rect class="box" x="40" y="232" width="390" height="60" rx="10"/>
  <text x="60" y="268" font-size="16" class="t"><tspan class="num">2 · </tspan>Observar el pueblo (dios que mira)</text>

  <rect class="box" x="40" y="312" width="390" height="60" rx="10"/>
  <text x="60" y="348" font-size="16" class="t"><tspan class="num">3 · </tspan>Enfocar vía Hada (sin orden directa)</text>

  <rect class="box" x="40" y="392" width="390" height="60" rx="10" stroke="#7a3047"/>
  <text x="60" y="428" font-size="16" class="t"><tspan class="num">4 · </tspan>Merger: sacrificar un héroe <tspan class="warn">→ boost</tspan></text>

  <rect class="box" x="40" y="472" width="390" height="60" rx="10" stroke="#7a3047"/>
  <text x="60" y="508" font-size="16" class="t"><tspan class="num">5 · </tspan>La Torre = <tspan class="warn">decorado</tspan> (no se entra)</text>

  <rect x="40" y="556" width="390" height="100" rx="10" fill="#170f1e" stroke="#3a2342"/>
  <text x="60" y="586" font-size="14.5" class="dim">Crecer = vivir solo (sin combate)</text>
  <text x="60" y="612" font-size="14.5" class="dim">Muerte = hambre / pueblo</text>
  <text x="60" y="638" font-size="14.5" class="dim">Hada = <tspan class="warn">muro único</tspan> (todo pasa por ella)</text>

  <line x1="235" y1="214" x2="235" y2="230" stroke="#b080ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="235" y1="294" x2="235" y2="310" stroke="#b080ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="235" y1="374" x2="235" y2="390" stroke="#b080ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="235" y1="454" x2="235" y2="470" stroke="#b080ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="235" y1="534" x2="235" y2="554" stroke="#b080ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== CENTER ===== -->
  <text x="700" y="126" text-anchor="middle" font-size="19" class="vio" letter-spacing="2">CÓMO REMODELARLO</text>

  <rect x="470" y="170" width="460" height="54" rx="27" fill="#161226" stroke="#4a3a6a"/>
  <text x="700" y="203" text-anchor="middle" font-size="16"><tspan class="warn">Dios observador </tspan><tspan class="gold">→ </tspan><tspan class="keep">Master que comanda</tspan></text>

  <rect x="470" y="242" width="460" height="54" rx="27" fill="#161226" stroke="#4a3a6a"/>
  <text x="700" y="275" text-anchor="middle" font-size="16"><tspan class="warn">Hada muro </tspan><tspan class="gold">→ </tspan><tspan class="keep">Hada asistente</tspan></text>

  <rect x="470" y="314" width="460" height="54" rx="27" fill="#161226" stroke="#4a3a6a"/>
  <text x="700" y="347" text-anchor="middle" font-size="16"><tspan class="warn">Merger (sacrificio) </tspan><tspan class="gold">→ </tspan><tspan class="keep">Promoción (materiales)</tspan></text>

  <rect x="470" y="386" width="460" height="54" rx="27" fill="#161226" stroke="#4a3a6a"/>
  <text x="700" y="419" text-anchor="middle" font-size="16"><tspan class="warn">Torre decorado </tspan><tspan class="gold">→ </tspan><tspan class="keep">Torre jugable (100 pisos)</tspan></text>

  <rect x="470" y="458" width="460" height="54" rx="27" fill="#161226" stroke="#4a3a6a"/>
  <text x="700" y="491" text-anchor="middle" font-size="16"><tspan class="warn">Crecer solo </tspan><tspan class="gold">→ </tspan><tspan class="keep">Combate + nivel + skills</tspan></text>

  <rect x="470" y="530" width="460" height="54" rx="27" fill="#161226" stroke="#4a3a6a"/>
  <text x="700" y="563" text-anchor="middle" font-size="16"><tspan class="warn">Muerte en el pueblo </tspan><tspan class="gold">→ </tspan><tspan class="keep">Muerte en la mazmorra</tspan></text>

  <text x="450" y="370" text-anchor="middle" font-size="60" fill="#2f2548">»</text>
  <text x="950" y="370" text-anchor="middle" font-size="60" fill="#3a2e12">»</text>

  <!-- ===== OBJETIVO ===== -->
  <rect x="970" y="104" width="390" height="32" rx="8" fill="#221b08" stroke="#f0c040"/>
  <text x="1165" y="126" text-anchor="middle" font-size="17" class="gold" letter-spacing="2">OBJETIVO — como la novela</text>

  <rect class="box" x="970" y="150" width="390" height="56" rx="10" stroke="#5a4a1a"/>
  <text x="990" y="184" font-size="15.5" class="t"><tspan class="gold">1 · </tspan>Invocar (gacha 1★–7★)<tspan class="keep"> ✓</tspan></text>

  <rect class="box" x="970" y="222" width="390" height="56" rx="10" stroke="#5a4a1a"/>
  <text x="990" y="256" font-size="15.5" class="t"><tspan class="gold">2 · </tspan>Vincular: nombrar · regalar · ordenar</text>

  <rect class="box" x="970" y="294" width="390" height="56" rx="10" stroke="#5a4a1a"/>
  <text x="990" y="328" font-size="15.5" class="t"><tspan class="gold">3 · </tspan>Formar equipo → expedición</text>

  <rect class="box" x="970" y="366" width="390" height="56" rx="10" stroke="#5a4a1a"/>
  <text x="990" y="400" font-size="15.5" class="t"><tspan class="gold">4 · </tspan>Combate por piso (stats del alma)</text>

  <rect class="box" x="970" y="438" width="390" height="56" rx="10" stroke="#5a4a1a"/>
  <text x="990" y="472" font-size="15.5" class="t"><tspan class="gold">5 · </tspan>Nivel + Promover (materiales→skills)</text>

  <rect class="box" x="970" y="510" width="390" height="56" rx="10" stroke="#5a4a1a"/>
  <text x="990" y="544" font-size="15.5" class="t"><tspan class="gold">6 · </tspan>Subir → Piso 100 = salvar el mundo</text>

  <rect x="970" y="586" width="390" height="100" rx="10" fill="#1a1608" stroke="#4a3a12"/>
  <text x="990" y="616" font-size="14.5" class="dim">Crecer = combate · nivel · promoción</text>
  <text x="990" y="642" font-size="14.5" class="dim">Muerte = <tspan class="keep">permadeath en la Torre</tspan></text>
  <text x="990" y="668" font-size="14.5" class="dim">Hada = <tspan class="keep">asistente</tspan> (guía y ejecuta)</text>

  <line x1="1165" y1="208" x2="1165" y2="220" stroke="#f0c040" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="1165" y1="280" x2="1165" y2="292" stroke="#f0c040" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="1165" y1="352" x2="1165" y2="364" stroke="#f0c040" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="1165" y1="424" x2="1165" y2="436" stroke="#f0c040" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="1165" y1="496" x2="1165" y2="508" stroke="#f0c040" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="1165" y1="568" x2="1165" y2="584" stroke="#f0c040" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- loop back: the run repeats -->
  <path d="M1362,632 C1392,600 1392,200 1362,176" fill="none" stroke="#f0c040" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrG)"/>
  <text x="1388" y="405" text-anchor="middle" font-size="13" class="gold" transform="rotate(90 1388 405)">se repite cada run</text>

  <!-- bottom banner -->
  <rect x="40" y="708" width="1320" height="86" rx="12" fill="#0c0a16" stroke="#2e2348"/>
  <text x="700" y="742" text-anchor="middle" font-size="17" class="gold">La joya (motor determinista de almas) NO se toca.</text>
  <text x="700" y="772" text-anchor="middle" font-size="16" class="dim">Solo cambian el <tspan class="vio">ENCUADRE</tspan> (el jugador es un Master, no un dios que mira) y el <tspan class="vio">BUCLE</tspan> (la Torre ES el juego).</text>

  <text x="700" y="918" text-anchor="middle" font-size="12.5" class="dim">Fuente: Pick Me Up! Infinite Gacha — “los Masters fortifican su base y movilizan héroes para subir la Torre; fallar en la mazmorra = muerte permanente real”.</text>
</svg>
